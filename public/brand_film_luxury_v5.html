<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jose Oliveira Films | Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F7F4EF;
            --ink: #1A1814;
            --ink-light: #6B6760;
            --ink-faint: #C4C0B8;
            --gold: #A8844A;
            --gold-light: #D4B97A;
            --gold-faint: #F0E8D8;
            --border: #E2DDD4;
            --white: #FFFFFF;
            --error: #8B3A2A;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--cream);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .form-container {
            max-width: 800px;
            margin: 80px auto;
            padding: 60px;
            background: var(--white);
            border: 1px solid var(--border);
            position: relative;
        }

        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.8s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 40px;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .form-group { margin-bottom: 35px; position: relative; }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
            color: var(--ink-light);
        }

        input, textarea, select {
            width: 100%;
            padding: 15px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            font-family: 'DM Sans', sans-serif;
            font-size: 1.1rem;
            color: var(--ink);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 0;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-bottom-color: var(--gold);
        }

        /* Estilos de Erro */
        .error-input { border-bottom-color: var(--error) !important; }
        .error-message {
            color: var(--error);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 8px;
            display: block;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 60px;
            gap: 20px;
        }

        button {
            padding: 18px 40px;
            border: 1px solid var(--ink);
            background: var(--ink);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.4s;
            flex: 1;
        }

        button.secondary {
            background: transparent;
            color: var(--ink);
        }

        button:hover {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--white);
        }

        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gold-faint);
            z-index: 1000;
        }

        .progress-bar {
            height: 100%;
            background: var(--gold);
            width: 33.33%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #thank-you { text-align: center; display: none; }
    </style>
</head>
<body>

<div class="progress-container"><div class="progress-bar" id="progress"></div></div>

<div class="form-container">
    <form id="luxuryForm" novalidate>
        <!-- STEP 1 -->
        <div class="step active" data-step="1">
            <h2>Tell us about yourself.</h2>
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" placeholder="Enter your first name" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" placeholder="Enter your last name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Instagram Handle</label>
                <input type="text" name="instagram" placeholder="@yourprofile" required>
            </div>
            <div class="form-group">
                <label>Phone / WhatsApp</label>
                <input type="tel" name="phone" placeholder="+1 234 567 890" required>
            </div>
        </div>

        <!-- STEP 2 -->
        <div class="step" data-step="2">
            <h2>Project Details.</h2>
            <div class="form-group">
                <label>Brand / Company Name</label>
                <input type="text" name="brand_name" placeholder="Name of your brand" required>
            </div>
            <div class="form-group">
                <label>Project Location (Where will the filming take place?)</label>
                <input type="text" name="project_location" placeholder="City, Country or Venue" required>
            </div>
            <div class="form-group">
                <label>Project Timeline</label>
                <select name="project_timeline" required>
                    <option value="">Select a timeline</option>
                    <option value="ASAP">As soon as possible</option>
                    <option value="1-3 Months">In 1-3 months</option>
                    <option value="3-6 Months">In 3-6 months</option>
                    <option value="Flexible">Flexible</option>
                </select>
            </div>
            <div class="form-group">
                <label>Intended Investment (USD)</label>
                <select name="intended_investment" required>
                    <option value="">Select range</option>
                    <option value="$5k - $10k">$5,000 - $10,000</option>
                    <option value="$10k - $20k">$10,000 - $20,000</option>
                    <option value="$20k+">$20,000+</option>
                </select>
            </div>
        </div>

        <!-- STEP 3 -->
        <div class="step" data-step="3">
            <h2>The Vision.</h2>
            <div class="form-group">
                <label>Tell us about your vision for this film</label>
                <textarea name="vision" rows="4" placeholder="Describe the goals, mood, and story..." required></textarea>
            </div>
            <div class="form-group">
                <label>How did you hear about us?</label>
                <select name="how_did_you_hear" required>
                    <option value="">Select option</option>
                    <option value="Instagram">Instagram</option>
                    <option value="Referral">Referral</option>
                    <option value="Google">Google</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div class="btn-container">
            <button type="button" class="secondary" id="prevBtn" style="display:none;">Back</button>
            <button type="button" id="nextBtn">Next Step</button>
        </div>
    </form>

    <div id="thank-you">
        <h2 style="color: var(--gold);">Application Received.</h2>
        <p>Thank you for reaching out. We will review your application and contact you shortly.</p>
    </div>
</div>

<script>
    let currentStep = 1;
    const totalSteps = 3;
    const form = document.getElementById('luxuryForm');
    const steps = document.querySelectorAll('.step');
    const progress = document.getElementById('progress');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const thankYou = document.getElementById('thank-you');

    const RAILWAY_URL = 'https://apply.joseoliveirafilms.com/lead';

    function updateUI() {
        steps.forEach(s => s.classList.remove('active'));
        document.querySelector(`[data-step="${currentStep}"]`).classList.add('active');
        progress.style.width = `${(currentStep / totalSteps) * 100}%`;
        prevBtn.style.display = currentStep === 1 ? 'none' : 'block';
        nextBtn.innerText = currentStep === totalSteps ? 'Submit Application' : 'Next Step';
        window.scrollTo(0, 0);
    }

    function validateStep() {
        const activeStep = document.querySelector(`[data-step="${currentStep}"]`);
        const inputs = activeStep.querySelectorAll('input[required], select[required], textarea[required]');
        let isValid = true;

        inputs.forEach(input => {
            input.classList.remove('error-input');
            const existingError = input.parentNode.querySelector('.error-message');
            if (existingError) existingError.remove();

            if (!input.value.trim() || (input.tagName === 'SELECT' && input.value === "")) {
                isValid = false;
                input.classList.add('error-input');
                const error = document.createElement('span');
                error.className = 'error-message';
                error.innerText = 'This field is required';
                input.parentNode.appendChild(error);
            }
        });

        return isValid;
    }

    nextBtn.addEventListener('click', async () => {
        if (!validateStep()) return;

        if (currentStep < totalSteps) {
            currentStep++;
            updateUI();
        } else {
            nextBtn.innerText = 'Sending...';
            nextBtn.disabled = true;

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch(RAILWAY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    form.style.display = 'none';
                    document.querySelector('.progress-container').style.display = 'none';
                    thankYou.style.display = 'block';
                } else {
                    alert('Error sending application.');
                    nextBtn.innerText = 'Submit Application';
                    nextBtn.disabled = false;
                }
            } catch (error) {
                alert('Connection error.');
                nextBtn.innerText = 'Submit Application';
                nextBtn.disabled = false;
            }
        }
    });

    prevBtn.addEventListener('click', () => {
        if (currentStep > 1) {
            currentStep--;
            updateUI();
        }
    });
</script>

</body>
</html>
